<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Docker Compose Generator</title>
<script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
<style>
:root{--bg:#0f172a;--bg2:#1e293b;--bg3:#334155;--accent:#38bdf8;--accent2:#818cf8;--green:#4ade80;--red:#f87171;--yellow:#fbbf24;--text:#e2e8f0;--text2:#94a3b8;--border:#475569;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:1400px;margin:0 auto;padding:20px}
header{text-align:center;padding:30px 0 20px}
header h1{font-size:2.2em;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
header p{color:var(--text2);font-size:1.1em}
.api-key-bar{display:flex;gap:10px;align-items:center;margin-bottom:20px;padding:12px 16px;background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border);flex-wrap:wrap}
.api-key-bar label{white-space:nowrap;font-weight:600;color:var(--accent)}
.api-key-bar input{flex:1;min-width:200px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:14px}
.api-key-bar input:focus{outline:none;border-color:var(--accent)}
.tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--bg2);padding:4px;border-radius:var(--radius);flex-wrap:wrap}
.tab{flex:1;padding:12px;text-align:center;border:none;background:transparent;color:var(--text2);cursor:pointer;border-radius:8px;font-size:14px;font-weight:500;transition:all .2s;min-width:80px}
.tab:hover{color:var(--text);background:var(--bg3)}
.tab.active{background:var(--accent);color:#0f172a;font-weight:700}
.panel{display:none}.panel.active{display:block}
.ai-panel{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.ai-input-section,.ai-output-section{background:var(--bg2);border-radius:var(--radius);padding:20px;border:1px solid var(--border)}
.ai-input-section h3,.ai-output-section h3{margin-bottom:12px;color:var(--accent);font-size:1.1em}
textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;color:var(--text);font-family:monospace;font-size:14px;resize:vertical}
textarea:focus{outline:none;border-color:var(--accent)}
#aiPrompt{height:120px;font-family:inherit}
.btn{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#0f172a}
.btn-primary:hover{background:#7dd3fc;transform:translateY(-1px)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-secondary{background:var(--bg3);color:var(--text)}
.btn-secondary:hover{background:var(--border)}
.btn-success{background:var(--green);color:#0f172a}
.btn-danger{background:var(--red);color:#0f172a}
.btn-small{padding:6px 12px;font-size:12px}
.btn-group{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.templates-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px;margin-bottom:20px}
.template-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:all .2s}
.template-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 25px rgba(56,189,248,.1)}
.template-card h4{color:var(--accent);margin-bottom:8px}
.template-card p{color:var(--text2);font-size:13px;line-height:1.5}
.template-card .tags{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.template-card .tag{background:var(--bg3);color:var(--text2);padding:2px 8px;border-radius:4px;font-size:11px}
.editor-layout{display:grid;grid-template-columns:350px 1fr;gap:20px}
.services-list{background:var(--bg2);border-radius:var(--radius);padding:16px;border:1px solid var(--border);max-height:70vh;overflow-y:auto}
.service-item{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px;cursor:pointer;transition:all .2s}
.service-item:hover,.service-item.active{border-color:var(--accent)}
.service-item h4{color:var(--accent);font-size:14px}
.service-item .service-image{color:var(--text2);font-size:12px}
.service-detail{background:var(--bg2);border-radius:var(--radius);padding:20px;border:1px solid var(--border)}
.form-group{margin-bottom:16px}
.form-group label{display:block;margin-bottom:6px;font-weight:600;color:var(--text2);font-size:13px}
.form-group input,.form-group select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:14px}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--accent)}
.kv-row{display:flex;gap:8px;margin-bottom:6px;align-items:center}
.kv-row input{flex:1}
.yaml-output{position:relative}
.yaml-output pre{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:16px;overflow-x:auto;font-size:13px;line-height:1.6;min-height:200px;max-height:60vh;overflow-y:auto}
.yaml-output .toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.yaml-key{color:#38bdf8}.yaml-string{color:#4ade80}.yaml-number{color:#fbbf24}.yaml-bool{color:#f87171}.yaml-comment{color:#64748b;font-style:italic}.yaml-dash{color:#818cf8}.yaml-colon{color:#94a3b8}
.validation-bar{padding:10px 16px;border-radius:8px;margin:12px 0;font-size:14px;font-weight:500}
.validation-bar.valid{background:rgba(74,222,128,.1);color:var(--green);border:1px solid rgba(74,222,128,.2)}
.validation-bar.invalid{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.2)}
.dep-graph{background:var(--bg2);border-radius:var(--radius);padding:16px;border:1px solid var(--border);margin-top:16px}
.dep-graph h3{color:var(--accent);margin-bottom:12px;font-size:1em}
.dep-graph svg{width:100%;min-height:150px}
.explanations{background:var(--bg2);border-radius:var(--radius);padding:20px;border:1px solid var(--border);margin-top:16px}
.explanations h3{color:var(--accent);margin-bottom:16px}
.loading{display:flex;align-items:center;gap:10px;color:var(--text2);padding:12px}
.loading-spinner{width:20px;height:20px;border:3px solid var(--bg3);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;right:20px;padding:12px 20px;border-radius:8px;color:#fff;font-weight:500;z-index:999;transform:translateY(100px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{background:var(--green);color:#0f172a}
.toast.error{background:var(--red);color:#fff}
.quick-prompts{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
.quick-prompts button{background:var(--bg);border:1px solid var(--border);color:var(--text2);padding:6px 12px;border-radius:20px;font-size:12px;cursor:pointer;transition:all .2s}
.quick-prompts button:hover{border-color:var(--accent);color:var(--accent)}
@media(max-width:768px){.ai-panel,.editor-layout{grid-template-columns:1fr}.tabs{flex-wrap:wrap}.tab{min-width:auto;flex:1 1 45%}}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🐳 AI Docker Compose Generator</h1>
    <p>用自然语言描述你的架构，AI 帮你生成 docker-compose.yml</p>
  </header>
  <div class="api-key-bar">
    <label>🔑 DeepSeek API Key:</label>
    <input type="password" id="apiKey" placeholder="输入你的 DeepSeek API Key（保存在本地）">
  </div>
  <div class="tabs">
    <button class="tab active" data-tab="ai">🤖 AI 生成</button>
    <button class="tab" data-tab="templates">📦 模板</button>
    <button class="tab" data-tab="editor">✏️ 编辑器</button>
    <button class="tab" data-tab="output">📄 输出</button>
  </div>
  <!-- AI Panel -->
  <div id="panel-ai" class="panel active">
    <div class="ai-panel">
      <div class="ai-input-section">
        <h3>💬 描述你的架构</h3>
        <textarea id="aiPrompt" placeholder="例如：我需要一个 Node.js 后端 + React 前端 + PostgreSQL 数据库 + Redis 缓存的开发环境，前端跑在3000端口，后端跑在4000端口..."></textarea>
        <div class="quick-prompts">
          <button onclick="setPrompt('一个基于 Spring Boot + MySQL + Redis 的微服务后端')">Spring Boot</button>
          <button onclick="setPrompt('Python Flask API + PostgreSQL + Celery + RabbitMQ 异步任务队列')">Flask + Celery</button>
          <button onclick="setPrompt('Nginx 反向代理 + 3个 Node.js 实例 + MongoDB 副本集 + Redis')">Nginx 负载均衡</button>
          <button onclick="setPrompt('Elasticsearch + Logstash + Kibana (ELK) 日志分析栈')">ELK Stack</button>
          <button onclick="setPrompt('GitLab CE + PostgreSQL + Redis 自托管代码仓库')">GitLab 自托管</button>
        </div>
        <div class="btn-group">
          <button class="btn btn-primary" id="aiGenBtn" onclick="generateWithAI()">🚀 AI 生成</button>
        </div>
        <div id="aiStatus" style="margin-top:12px"></div>
      </div>
      <div class="ai-output-section">
        <h3>📝 预览</h3>
        <div class="yaml-output">
          <pre><code id="aiPreview">// AI 生成的 YAML 将显示在这里...</code></pre>
        </div>
        <div id="validationBar"></div>
        <div class="btn-group">
          <button class="btn btn-small btn-secondary" onclick="copyYaml()">📋 复制</button>
          <button class="btn btn-small btn-secondary" onclick="downloadYaml()">💾 下载</button>
          <button class="btn btn-small btn-success" onclick="applyToEditor()">✏️ 编辑器中打开</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Templates Panel -->
  <div id="panel-templates" class="panel">
    <h3 style="color:var(--accent);margin-bottom:16px">📦 预设模板 — 点击即用</h3>
    <div class="templates-grid" id="templatesGrid"></div>
  </div>

  <!-- Editor Panel -->
  <div id="panel-editor" class="panel">
    <div class="editor-layout">
      <div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <h3 style="color:var(--accent)">📋 服务列表</h3>
          <button class="btn btn-small btn-primary" onclick="addService()">+ 添加服务</button>
        </div>
        <div class="services-list" id="servicesList"></div>
        <button class="btn btn-primary" style="width:100%;margin-top:12px" onclick="generateFromEditor()">🔄 生成 YAML</button>
      </div>
      <div>
        <div class="service-detail" id="serviceDetail">
          <p style="color:var(--text2);text-align:center;padding:40px">👈 选择或添加一个服务开始编辑</p>
        </div>
        <div class="dep-graph" id="depGraph">
          <h3>🔗 服务依赖关系</h3>
          <svg id="depSvg"></svg>
        </div>
      </div>
    </div>
  </div>

  <!-- Output Panel -->
  <div id="panel-output" class="panel">
    <div class="yaml-output">
      <div class="toolbar">
        <button class="btn btn-small btn-secondary" onclick="copyYaml()">📋 复制</button>
        <button class="btn btn-small btn-secondary" onclick="downloadYaml()">💾 下载</button>
        <button class="btn btn-small btn-success" onclick="applyToEditor()">✏️ 编辑器中打开</button>
      </div>
      <pre><code id="yamlOutput">// 通过 AI 生成或模板选择来生成 YAML...</code></pre>
    </div>
    <div id="validationBar2"></div>
    <div class="explanations" id="explanations">
      <h3>📖 配置说明</h3>
      <dl id="explanationsList"></dl>
    </div>
  </div>
</div>
<script>
// ===== State =====
let services = [];
let activeServiceIdx = -1;
let currentYaml = '';

// ===== Tab Switching =====
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
  });
});
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + name));
}

// ===== Toast =====
function showToast(msg, type='success') {
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.classList.add('show'), 10);
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 2500);
}

// ===== Templates =====
const TEMPLATES = {
  lamp: {
    name: 'LAMP Stack', desc: 'Linux + Apache + MySQL + PHP 经典Web开发栈',
    tags: ['Apache','MySQL','PHP'],
    services: [
      {name:'web',image:'php:8.2-apache',ports:[{host:'8080',container:'80'}],volumes:['./src:/var/www/html'],depends_on:['db'],environment:[{key:'MYSQL_HOST',value:'db'}]},
      {name:'db',image:'mysql:8.0',ports:[{host:'3306',container:'3306'}],volumes:['mysql_data:/var/lib/mysql'],depends_on:[],environment:[{key:'MYSQL_ROOT_PASSWORD',value:'rootpass'},{key:'MYSQL_DATABASE',value:'app'}]},
      {name:'phpmyadmin',image:'phpmyadmin:latest',ports:[{host:'8081',container:'80'}],volumes:[],depends_on:['db'],environment:[{key:'PMA_HOST',value:'db'}]}
    ], volumes:['mysql_data']
  },
  mern: {
    name: 'MERN Stack', desc: 'MongoDB + Express + React + Node.js 全栈JavaScript',
    tags: ['MongoDB','Express','React','Node.js'],
    services: [
      {name:'frontend',image:'node:20-alpine',ports:[{host:'3000',container:'3000'}],volumes:['./frontend:/app'],depends_on:['api'],environment:[{key:'REACT_APP_API_URL',value:'http://localhost:4000'}]},
      {name:'api',image:'node:20-alpine',ports:[{host:'4000',container:'4000'}],volumes:['./backend:/app'],depends_on:['mongo'],environment:[{key:'MONGO_URI',value:'mongodb://mongo:27017/app'}]},
      {name:'mongo',image:'mongo:7',ports:[{host:'27017',container:'27017'}],volumes:['mongo_data:/data/db'],depends_on:[],environment:[]}
    ], volumes:['mongo_data']
  },
  django: {
    name: 'Django + PostgreSQL', desc: 'Python Django框架 + PostgreSQL + Redis缓存',
    tags: ['Django','PostgreSQL','Redis'],
    services: [
      {name:'web',image:'python:3.12-slim',ports:[{host:'8000',container:'8000'}],volumes:['./app:/app'],depends_on:['db','redis'],environment:[{key:'DATABASE_URL',value:'postgres://postgres:postgres@db:5432/app'},{key:'REDIS_URL',value:'redis://redis:6379/0'}]},
      {name:'db',image:'postgres:16-alpine',ports:[{host:'5432',container:'5432'}],volumes:['pg_data:/var/lib/postgresql/data'],depends_on:[],environment:[{key:'POSTGRES_DB',value:'app'},{key:'POSTGRES_PASSWORD',value:'postgres'}]},
      {name:'redis',image:'redis:7-alpine',ports:[{host:'6379',container:'6379'}],volumes:[],depends_on:[],environment:[]}
    ], volumes:['pg_data']
  },
  laravel: {
    name: 'Laravel + MySQL', desc: 'PHP Laravel + MySQL + Nginx + Redis',
    tags: ['Laravel','MySQL','Nginx','Redis'],
    services: [
      {name:'nginx',image:'nginx:alpine',ports:[{host:'80',container:'80'}],volumes:['./nginx.conf:/etc/nginx/conf.d/default.conf','./src:/var/www'],depends_on:['app'],environment:[]},
      {name:'app',image:'php:8.2-fpm',ports:[],volumes:['./src:/var/www'],depends_on:['db','redis'],environment:[{key:'DB_HOST',value:'db'},{key:'DB_DATABASE',value:'laravel'},{key:'DB_PASSWORD',value:'secret'},{key:'REDIS_HOST',value:'redis'}]},
      {name:'db',image:'mysql:8.0',ports:[{host:'3306',container:'3306'}],volumes:['mysql_data:/var/lib/mysql'],depends_on:[],environment:[{key:'MYSQL_ROOT_PASSWORD',value:'secret'},{key:'MYSQL_DATABASE',value:'laravel'}]},
      {name:'redis',image:'redis:7-alpine',ports:[{host:'6379',container:'6379'}],volumes:[],depends_on:[],environment:[]}
    ], volumes:['mysql_data']
  },
  wordpress: {
    name: 'WordPress', desc: 'WordPress + MySQL + phpMyAdmin 完整建站方案',
    tags: ['WordPress','MySQL','phpMyAdmin'],
    services: [
      {name:'wordpress',image:'wordpress:latest',ports:[{host:'8080',container:'80'}],volumes:['wp_data:/var/www/html'],depends_on:['db'],environment:[{key:'WORDPRESS_DB_HOST',value:'db'},{key:'WORDPRESS_DB_USER',value:'wp'},{key:'WORDPRESS_DB_PASSWORD',value:'wppass'},{key:'WORDPRESS_DB_NAME',value:'wordpress'}]},
      {name:'db',image:'mysql:8.0',ports:[],volumes:['db_data:/var/lib/mysql'],depends_on:[],environment:[{key:'MYSQL_ROOT_PASSWORD',value:'rootpass'},{key:'MYSQL_DATABASE',value:'wordpress'},{key:'MYSQL_USER',value:'wp'},{key:'MYSQL_PASSWORD',value:'wppass'}]},
      {name:'phpmyadmin',image:'phpmyadmin:latest',ports:[{host:'8081',container:'80'}],volumes:[],depends_on:['db'],environment:[{key:'PMA_HOST',value:'db'}]}
    ], volumes:['wp_data','db_data']
  },
  nextjs: {
    name: 'Next.js + PostgreSQL', desc: 'Next.js 前端 + PostgreSQL 现代全栈',
    tags: ['Next.js','PostgreSQL'],
    services: [
      {name:'app',image:'node:20-alpine',ports:[{host:'3000',container:'3000'}],volumes:['./app:/app'],depends_on:['db'],environment:[{key:'DATABASE_URL',value:'postgres://postgres:postgres@db:5432/app'}]},
      {name:'db',image:'postgres:16-alpine',ports:[{host:'5432',container:'5432'}],volumes:['pg_data:/var/lib/postgresql/data'],depends_on:[],environment:[{key:'POSTGRES_PASSWORD',value:'postgres'},{key:'POSTGRES_DB',value:'app'}]}
    ], volumes:['pg_data']
  }
};

// ===== Render Templates =====
function renderTemplates() {
  const el = document.getElementById('templatesGrid');
  el.innerHTML = Object.entries(TEMPLATES).map(([key, t]) => `
    <div class="template-card" onclick="loadTemplate('${key}')">
      <h4>${t.name}</h4>
      <p>${t.desc}</p>
      <div class="tags">${t.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}</div>
    </div>
  `).join('');
}

function loadTemplate(key) {
  const t = TEMPLATES[key];
  if (!t) return;
  services = JSON.parse(JSON.stringify(t.services));
  activeServiceIdx = 0;
  renderServicesList();
  renderServiceDetail();
  generateFromEditor();
  switchTab('editor');
  showToast('已加载模板: ' + t.name);
}

// ===== Service Editor =====
function addService() {
  services.push({name:'service_'+(services.length+1),image:'',ports:[],volumes:[],depends_on:[],environment:[]});
  activeServiceIdx = services.length - 1;
  renderServicesList();
  renderServiceDetail();
}

function removeService(idx) {
  const name = services[idx].name;
  services.splice(idx, 1);
  services.forEach(s => { s.depends_on = s.depends_on.filter(d => d !== name); });
  if (activeServiceIdx >= services.length) activeServiceIdx = services.length - 1;
  renderServicesList();
  renderServiceDetail();
  renderDepGraph();
}

function renderServicesList() {
  const el = document.getElementById('servicesList');
  if (services.length === 0) {
    el.innerHTML = '<p style="color:var(--text2);text-align:center;padding:20px">暂无服务，点击上方按钮添加</p>';
    return;
  }
  el.innerHTML = services.map((s, i) => `
    <div class="service-item ${i===activeServiceIdx?'active':''}" onclick="selectService(${i})">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><h4>🐳 ${s.name}</h4><span class="service-image">${s.image||'未设置镜像'}</span></div>
        <button class="btn btn-small btn-danger" onclick="event.stopPropagation();removeService(${i})">✕</button>
      </div>
    </div>
  `).join('');
}

function selectService(idx) {
  activeServiceIdx = idx;
  renderServicesList();
  renderServiceDetail();
}

function renderServiceDetail() {
  const el = document.getElementById('serviceDetail');
  if (activeServiceIdx < 0 || activeServiceIdx >= services.length) {
    el.innerHTML = '<p style="color:var(--text2);text-align:center;padding:40px">👈 选择或添加一个服务开始编辑</p>';
    return;
  }
  const s = services[activeServiceIdx];
  const others = services.filter((_,i) => i !== activeServiceIdx).map(x => x.name);
  let html = `<h3 style="color:var(--accent);margin-bottom:16px">编辑服务: ${s.name}</h3>
    <div class="form-group"><label>服务名称</label><input value="${s.name}" onchange="updateField('name',this.value)"></div>
    <div class="form-group"><label>镜像 (Image)</label><input value="${s.image}" onchange="updateField('image',this.value)" placeholder="例如: nginx:alpine"></div>
    <div class="form-group"><label>端口映射</label>`;
  s.ports.forEach((p,i) => {
    html += `<div class="kv-row"><input placeholder="主机端口" value="${p.host}" onchange="updatePort(${i},'host',this.value)"><span style="color:var(--text2)">:</span><input placeholder="容器端口" value="${p.container}" onchange="updatePort(${i},'container',this.value)"><button class="btn btn-small btn-danger" onclick="removePort(${i})">✕</button></div>`;
  });
  html += `<button class="btn btn-small btn-secondary" onclick="addPort()">+ 添加端口</button></div>
    <div class="form-group"><label>环境变量</label>`;
  s.environment.forEach((e,i) => {
    html += `<div class="kv-row"><input placeholder="变量名" value="${e.key}" onchange="updateEnv(${i},'key',this.value)"><span style="color:var(--text2)">=</span><input placeholder="值" value="${e.value}" onchange="updateEnv(${i},'value',this.value)"><button class="btn btn-small btn-danger" onclick="removeEnv(${i})">✕</button></div>`;
  });
  html += `<button class="btn btn-small btn-secondary" onclick="addEnv()">+ 添加变量</button></div>
    <div class="form-group"><label>数据卷 (Volumes)</label>`;
  s.volumes.forEach((v,i) => {
    html += `<div class="kv-row"><input value="${v}" onchange="updateVol(${i},this.value)" style="flex:2"><button class="btn btn-small btn-danger" onclick="removeVol(${i})">✕</button></div>`;
  });
  html += `<button class="btn btn-small btn-secondary" onclick="addVol()">+ 添加卷</button></div>
    <div class="form-group"><label>依赖服务 (depends_on)</label>`;
  if (others.length > 0) {
    others.forEach(name => {
      html += `<label style="display:flex;align-items:center;gap:6px;margin-bottom:4px;cursor:pointer"><input type="checkbox" ${s.depends_on.includes(name)?'checked':''} onchange="toggleDep('${name}',this.checked)"><span>${name}</span></label>`;
    });
  } else {
    html += '<span style="color:var(--text2);font-size:13px">无其他服务可依赖</span>';
  }
  html += '</div>';
  el.innerHTML = html;
  renderDepGraph();
}

function updateField(field, value) { services[activeServiceIdx][field] = value; renderServicesList(); }
function addPort() { services[activeServiceIdx].ports.push({host:'',container:''}); renderServiceDetail(); }
function removePort(i) { services[activeServiceIdx].ports.splice(i,1); renderServiceDetail(); }
function updatePort(i,k,v) { services[activeServiceIdx].ports[i][k] = v; }
function addEnv() { services[activeServiceIdx].environment.push({key:'',value:''}); renderServiceDetail(); }
function removeEnv(i) { services[activeServiceIdx].environment.splice(i,1); renderServiceDetail(); }
function updateEnv(i,k,v) { services[activeServiceIdx].environment[i][k] = v; }
function addVol() { services[activeServiceIdx].volumes.push(''); renderServiceDetail(); }
function removeVol(i) { services[activeServiceIdx].volumes.splice(i,1); renderServiceDetail(); }
function updateVol(i,v) { services[activeServiceIdx].volumes[i] = v; }
function toggleDep(name, checked) {
  const s = services[activeServiceIdx];
  if (checked && !s.depends_on.includes(name)) s.depends_on.push(name);
  else s.depends_on = s.depends_on.filter(d => d !== name);
  renderDepGraph();
}

// ===== Generate YAML from Editor =====
function generateFromEditor() {
  if (services.length === 0) { showToast('请先添加服务','error'); return; }
  const compose = { version: '3.8', services: {} };
  const namedVols = new Set();
  services.forEach(s => {
    const svc = {};
    if (s.image) svc.image = s.image;
    if (s.ports && s.ports.length) {
      svc.ports = s.ports.filter(p => p.host && p.container).map(p => p.host+':'+p.container);
      if (!svc.ports.length) delete svc.ports;
    }
    if (s.environment && s.environment.length) {
      svc.environment = {};
      s.environment.filter(e => e.key).forEach(e => { svc.environment[e.key] = e.value || ''; });
      if (!Object.keys(svc.environment).length) delete svc.environment;
    }
    if (s.volumes && s.volumes.length) {
      svc.volumes = s.volumes.filter(v => v.trim());
      svc.volumes.forEach(v => { const p = v.split(':'); if (p[0] && !p[0].startsWith('.') && !p[0].startsWith('/')) namedVols.add(p[0]); });
      if (!svc.volumes.length) delete svc.volumes;
    }
    if (s.depends_on && s.depends_on.length) svc.depends_on = [...s.depends_on];
    compose.services[s.name] = svc;
  });
  if (namedVols.size) { compose.volumes = {}; namedVols.forEach(v => { compose.volumes[v] = null; }); }
  currentYaml = jsyaml.dump(compose, {indent:2,lineWidth:-1,noRefs:true,sortKeys:false});
  displayYaml(currentYaml);
  renderDepGraph();
}

// ===== Dependency Graph (SVG) =====
function renderDepGraph() {
  const svg = document.getElementById('depSvg');
  if (!services.length) { svg.innerHTML = ''; svg.setAttribute('height','0'); return; }
  const w = svg.parentElement.clientWidth - 32;
  const nw = 110, nh = 36, py = 60;
  // Layered layout via topological sort
  const layers = []; const placed = new Set(); let rem = [...services];
  let safety = 20;
  while (rem.length && safety-- > 0) {
    let layer = rem.filter(s => s.depends_on.every(d => placed.has(d)));
    if (!layer.length) layer = [rem[0]];
    layer.forEach(s => placed.add(s.name));
    layers.push(layer.map(s => s.name));
    rem = rem.filter(s => !placed.has(s.name));
  }
  const totalH = layers.length * (nh + py) + 20;
  svg.setAttribute('width', w);
  svg.setAttribute('height', totalH);
  const pos = {};
  let svgHtml = '<defs><marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8"/></marker></defs>';
  layers.forEach((layer, li) => {
    const y = li * (nh + py) + 20;
    const gap = w / (layer.length + 1);
    layer.forEach((name, ni) => {
      const x = gap * (ni + 1) - nw/2;
      pos[name] = {x: x + nw/2, y: y + nh/2, top: y, bottom: y + nh};
      const colors = ['#38bdf8','#818cf8','#4ade80','#fbbf24','#f87171','#a78bfa'];
      const color = colors[Object.keys(pos).length % colors.length];
      svgHtml += `<rect x="${x}" y="${y}" width="${nw}" height="${nh}" rx="8" fill="${color}22" stroke="${color}" stroke-width="2"/>`;
      svgHtml += `<text x="${x+nw/2}" y="${y+nh/2+5}" text-anchor="middle" fill="${color}" font-size="13" font-weight="600">${name}</text>`;
    });
  });
  // Draw arrows
  services.forEach(s => {
    s.depends_on.forEach(dep => {
      if (pos[s.name] && pos[dep]) {
        const from = pos[s.name], to = pos[dep];
        svgHtml += `<line x1="${from.x}" y1="${from.top}" x2="${to.x}" y2="${to.bottom}" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow)" opacity="0.6"/>`;
      }
    });
  });
  svg.innerHTML = svgHtml;
}

// ===== YAML Syntax Highlighting =====
function highlightYaml(yaml) {
  return yaml.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^(\s*)(#.*$)/gm,'$1<span class="yaml-comment">$2</span>')
    .replace(/^(\s*)([\w][\w.-]*)(:)/gm,'$1<span class="yaml-key">$2</span><span class="yaml-colon">$3</span>')
    .replace(/(:\s+)(\d+(\.\d+)?)\s*$/gm,'$1<span class="yaml-number">$2</span>')
    .replace(/(:\s+)(true|false|null|yes|no)\s*$/gm,'$1<span class="yaml-bool">$2</span>')
    .replace(/(-\s+)([\w])/g,'<span class="yaml-dash">$1</span>$2');
}

function displayYaml(yaml) {
  currentYaml = yaml;
  document.getElementById('yamlOutput').innerHTML = highlightYaml(yaml);
  document.getElementById('aiPreview').innerHTML = highlightYaml(yaml);
  validateYaml(yaml);
  generateExplanations(yaml);
  switchTab('output');
}

// ===== YAML Validation =====
function validateYaml(yaml) {
  ['validationBar','validationBar2'].forEach(id => {
    const bar = document.getElementById(id);
    if (!bar) return;
    try {
      const doc = jsyaml.load(yaml);
      if (doc && doc.services && typeof doc.services === 'object') {
        const n = Object.keys(doc.services).length;
        bar.innerHTML = '<div class="validation-bar valid">✅ YAML 有效 — 包含 '+n+' 个服务</div>';
      } else {
        bar.innerHTML = '<div class="validation-bar valid">✅ YAML 语法有效</div>';
      }
    } catch(e) {
      bar.innerHTML = '<div class="validation-bar invalid">❌ YAML 错误: '+e.message+'</div>';
    }
  });
}

// ===== Copy & Download =====
function copyYaml() {
  if (!currentYaml) { showToast('没有可复制的内容','error'); return; }
  navigator.clipboard.writeText(currentYaml).then(() => showToast('已复制到剪贴板'));
}
function downloadYaml() {
  if (!currentYaml) { showToast('没有可下载的内容','error'); return; }
  const blob = new Blob([currentYaml], {type:'text/yaml'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'docker-compose.yml';
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('已下载 docker-compose.yml');
}

// ===== Apply YAML to Editor =====
function applyToEditor() {
  if (!currentYaml) { showToast('没有可编辑的YAML','error'); return; }
  try {
    const doc = jsyaml.load(currentYaml);
    if (!doc || !doc.services) { showToast('YAML中没有services定义','error'); return; }
    services = [];
    Object.entries(doc.services).forEach(([name, svc]) => {
      const s = {name, image:svc.image||'', ports:[], volumes:[], depends_on:[], environment:[]};
      if (svc.ports) s.ports = svc.ports.map(p => { const parts = String(p).split(':'); return {host:parts[0]||'',container:parts[1]||parts[0]||''}; });
      if (svc.environment) {
        if (Array.isArray(svc.environment)) s.environment = svc.environment.map(e => { const [k,...v]=String(e).split('='); return {key:k,value:v.join('=')}; });
        else s.environment = Object.entries(svc.environment).map(([k,v]) => ({key:k,value:String(v||'')}));
      }
      if (svc.volumes) s.volumes = svc.volumes.map(String);
      if (svc.depends_on) s.depends_on = Array.isArray(svc.depends_on) ? svc.depends_on : Object.keys(svc.depends_on);
      services.push(s);
    });
    activeServiceIdx = 0;
    renderServicesList();
    renderServiceDetail();
    switchTab('editor');
    showToast('已导入到编辑器');
  } catch(e) { showToast('解析YAML失败: '+e.message,'error'); }
}

// ===== Config Explanations =====
const EXPLANATIONS = {
  'version':{title:'version',desc:'指定 Docker Compose 文件格式版本。3.8 是目前最常用的版本，支持大部分功能。'},
  'services':{title:'services',desc:'定义应用中的各个服务（容器）。每个服务对应一个容器实例。'},
  'image':{title:'image',desc:'指定服务使用的 Docker 镜像。格式为 name:tag，如 nginx:alpine。'},
  'ports':{title:'ports',desc:'端口映射，格式为 "主机端口:容器端口"。将容器内部端口暴露到主机。'},
  'environment':{title:'environment',desc:'设置容器内的环境变量。常用于配置数据库连接、密码等。'},
  'volumes':{title:'volumes',desc:'数据卷挂载。可以是命名卷（持久化数据）或绑定挂载（映射主机目录）。'},
  'depends_on':{title:'depends_on',desc:'定义服务启动依赖。确保依赖的服务先启动，但不保证服务"就绪"。'},
  'restart':{title:'restart',desc:'重启策略。always=总是重启，unless-stopped=除非手动停止，on-failure=失败时重启。'},
  'networks':{title:'networks',desc:'自定义网络配置。同一网络中的服务可以通过服务名互相访问。'},
  'build':{title:'build',desc:'从 Dockerfile 构建镜像而非使用预构建镜像。可指定构建上下文和参数。'},
  'command':{title:'command',desc:'覆盖容器默认启动命令。'},
  'healthcheck':{title:'healthcheck',desc:'健康检查配置，用于检测服务是否正常运行。'}
};

function generateExplanations(yaml) {
  const el = document.getElementById('explanationsList');
  const found = [];
  Object.entries(EXPLANATIONS).forEach(([key, info]) => {
    if (yaml.includes(key+':') || yaml.includes(key+' ')) found.push(info);
  });
  if (!found.length) { el.innerHTML = '<p style="color:var(--text2)">生成 YAML 后将显示配置说明</p>'; return; }
  el.innerHTML = found.map(f => `<div style="margin-bottom:12px"><dt style="color:var(--accent);font-weight:700;font-family:monospace">${f.title}</dt><dd style="color:var(--text2);margin-top:4px;padding-left:12px">${f.desc}</dd></div>`).join('');
}

// ===== AI Generation =====
async function generateWithAI() {
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { showToast('请先输入 DeepSeek API Key','error'); return; }
  const prompt = document.getElementById('aiPrompt').value.trim();
  if (!prompt) { showToast('请描述你的架构需求','error'); return; }
  const btn = document.getElementById('aiGenBtn');
  const statusEl = document.getElementById('aiStatus');
  btn.disabled = true;
  btn.innerHTML = '⏳ 生成中...';
  statusEl.innerHTML = '<div class="loading"><div class="loading-spinner"></div> AI 正在分析需求并生成配置...</div>';

  const sysPrompt = '你是一个 Docker Compose 配置专家。用户会用自然语言描述架构需求，你需要生成完整可用的 docker-compose.yml。\n要求：\n1. 只输出 YAML 内容，不要包含 ``` 代码块标记\n2. 使用 version: \'3.8\'\n3. 包含合理的默认配置（端口映射、环境变量、数据卷等）\n4. 添加有用的中文注释说明\n5. 使用最新稳定版镜像\n6. 考虑安全最佳实践\n7. 配置合理的 restart 策略\n8. 数据库配置数据持久化';

  try {
    const resp = await fetch('https://api.deepseek.com/chat/completions', {
      method: 'POST',
      headers: {'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
      body: JSON.stringify({
        model:'deepseek-chat',
        messages:[{role:'system',content:sysPrompt},{role:'user',content:prompt}],
        temperature:0.3,
        max_tokens:4096
      })
    });
    if (!resp.ok) {
      const err = await resp.json().catch(()=>({}));
      throw new Error(err.error?.message || 'API 请求失败 ('+resp.status+')');
    }
    const data = await resp.json();
    let yaml = data.choices[0].message.content.trim();
    yaml = yaml.replace(/^```ya?ml?\s*\n?/i,'').replace(/\n?```\s*$/i,'').trim();
    currentYaml = yaml;
    displayYaml(yaml);
    statusEl.innerHTML = '<div style="color:var(--green)">✅ 生成成功！已切换到输出面板。</div>';
    showToast('AI 生成完成');
  } catch(e) {
    statusEl.innerHTML = '<div style="color:var(--red)">❌ 错误: '+e.message+'</div>';
    showToast('生成失败: '+e.message,'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '🚀 AI 生成';
  }
}

function setPrompt(text) { document.getElementById('aiPrompt').value = text; }
